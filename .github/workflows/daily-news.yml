name: Daily Startup News

on:
  schedule:
    - cron: "0 20 * * 0-4"
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate news page
        env:
          ANTHROPIC_API_KEY: ${ { secrets.ANTHROPIC_API_KEY } }
        run: python scripts/generate_news.py

      - name: Commit and push
        run: |
          git config user.name "startup-news-bot"
          git config user.email "startup-news-bot@users.noreply.github.com"
          DATE=$(TZ=Asia/Tokyo date +%Y%m%d)
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add startup news for $DATE"
            git push
          fi
